<div class="container">

  <h2>Edit Post</h2>

  <div class="form-group">
    <label>Title</label>
    <input
      type="text"
      [(ngModel)]="post.title"
      placeholder="Enter title"
    />
  </div>

  <div class="form-group">
    <label>Author</label>
    <input
      type="text"
      [(ngModel)]="post.author"
      placeholder="Enter author"
    />
  </div>

  <div class="form-group">
    <label>Content</label>
    <textarea
      rows="6"
      [(ngModel)]="post.content"
      placeholder="Enter content"
    ></textarea>
  </div>

  <button (click)="updatePost()">
    Update Post
  </button>

</div>
