<div class="container">
  <h2>Create Blog Post</h2>

  <div class="form-group">
    <label>Title</label>
    <input
      type="text"
      placeholder="Enter title"
      [(ngModel)]="post.title"
    />
  </div>

  <div class="form-group">
    <label>Author</label>
    <input
      type="text"
      placeholder="Enter author name"
      [(ngModel)]="post.author"
    />
  </div>

  <div class="form-group">
    <label>Content</label>
    <textarea
      rows="6"
      placeholder="Write your content here..."
      [(ngModel)]="post.content"
    ></textarea>
  </div>

  <button (click)="savePost()">
    Save Post
  </button>
</div>
